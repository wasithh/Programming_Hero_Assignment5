<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Github Issue Helper</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
    <script src="main.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.min.css"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="min-h-screen flex items-center justify-center bg-slate-50 p-4">
      <div
        class="card w-full max-w-md bg-base-100 border-primary shadow-sm rounded-2xl"
      >
        <div class="card-body items-center p-8">
          <img src="github-logo.png" alt="GitHub" class="w-20 h-20 mb-2" />

          <h2 class="card-title text-2xl font-bold text-base-content">
            GitHub Issues Tracker
          </h2>
          <p class="text-sm text-base-content/60 mb-6">
            Sign in to manage your issues
          </p>

          <form class="w-full">
            <div class="form-control w-full">
              <label class="label">
                <span class="label-text font-semibold text-base-content"
                  >Username</span
                >
              </label>
              <input
                type="text"
                placeholder="Enter Username"
                class="input input-bordered w-full focus:input-primary focus:border-primary"
              />
              <label class="label pb-0">
                <span class="label-text-alt text-primary font-medium"
                  >Default: admin</span
                >
              </label>
            </div>

            <div class="form-control w-full mt-4">
              <label class="label">
                <span class="label-text font-semibold text-base-content"
                  >Password</span
                >
              </label>
              <input
                type="password"
                placeholder="Enter Password"
                class="input input-bordered w-full focus:input-primary focus:border-primary"
              />
              <label class="label pb-0">
                <span class="label-text-alt text-primary font-medium"
                  >Default: admin123</span
                >
              </label>
            </div>

            <button
              type="submit"
              class="btn btn-primary w-full mt-6 normal-case text-base"
            >
              Sign In
            </button>
          </form>

          <div
            class="divider text-base-content/40 text-sm font-medium mt-6 mb-2"
          >
            OR
          </div>

          <div class="w-full bg-base-200/50 rounded-xl p-5 text-center mt-2">
            <p class="text-xs text-base-content/50 mb-3 font-medium">
              Demo Credentials:
            </p>
            <p class="text-sm text-base-content mb-1">
              <span class="font-semibold">Username:</span> admin
            </p>
            <p class="text-sm text-base-content">
              <span class="font-semibold">Password:</span> admin123
            </p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
